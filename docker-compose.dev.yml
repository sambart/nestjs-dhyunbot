# 네이티브 dev 환경용 인프라 전용 compose.
# 앱(api/bot/web)은 호스트에서 `pnpm dev`로 직접 실행하고, DB/Redis만 컨테이너로 띄운다.
# 사용법:
#   docker compose -f docker-compose.dev.yml up -d   (= pnpm infra:up)
#   pnpm dev                                          (api/bot/web 동시 watch 실행)
services:
  db:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    # .env의 REDIS_PASSWORD와 일치시켜 네이티브 앱의 AUTH가 통과되도록 함
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
